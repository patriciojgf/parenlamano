<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Paren la Mano — En contexto (sitio de fans)</title>
<meta name="description" content="Sitio de fans, no oficial. Las coberturas de Paren la Mano puestas en contexto: cada evento ordenado, partido a partido. Los videos son originales y oficiales de los canales de sus protagonistas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=5">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png?v=5">
<link rel="apple-touch-icon" href="/assets/favicon-180.png?v=5">
<link rel="stylesheet" href="assets/home.css?v=5">
</head>
<body>

<header class="home-header">
  <h1 class="hero-logo"><img class="plm-logo" src="assets/plm-logo.jpg" alt="Paren la Mano" width="900" height="900"></h1>
  <span class="hl">En contexto</span>
</header>

<h2 class="section-h">Elegí un <span>evento</span></h2>
<main class="grid" id="grid"></main>

<div class="social">
  <a href="https://www.instagram.com/parenlamanok/" target="_blank" rel="noopener">Instagram</a>
  <a href="https://x.com/parenlamanok" target="_blank" rel="noopener">X</a>
  <a href="https://www.youtube.com/channel/UCulzKEqyE73gXCUqTimbP4A" target="_blank" rel="noopener">YouTube</a>
</div>

<footer>
  Sitio hecho por fans, no oficial · <a href="acerca/">Acerca de este sitio</a> · Sin fines comerciales.
</footer>

<script src="data/catalog.js?v=5"></script>
<script>
const grid = document.getElementById("grid");
(window.PLM_CATALOG || []).forEach(ev => {
  const t = ev.theme || {};
  const stats = (ev.stats || []).map(s => `<span>${s}</span>`).join("");
  const style = `--cprimary:${t.primary||'#333'};--cprimary-deep:${t.primaryDeep||'#111'};--caccent:${t.accent||'#D7A8F0'};--csecondary:${t.secondary||'#75AADB'}`;
  const inner = `
    <div class="tl-stripe"></div>
    <div class="tl-body">
      ${ev.eyebrow ? `<div class="tl-eyebrow">${ev.eyebrow}</div>` : ""}
      <div class="tl-title">${ev.title}</div>
      ${ev.dateRange ? `<div class="tl-date">${ev.dateRange}</div>` : ""}
      <p class="tl-sub">${ev.subtitle || ""}</p>
      ${ev.badge ? `<span class="tl-badge">${ev.badge}</span>` : ""}
      ${stats ? `<div class="tl-stats">${stats}</div>` : ""}
      ${ev.soon ? "" : `<div class="tl-cta">Ver el evento →</div>`}
    </div>`;
  let el;
  if (ev.soon) {
    el = document.createElement("div");
    el.className = "tl-card soon";
  } else {
    el = document.createElement("a");
    el.className = "tl-card live";
    el.href = ev.href || (ev.id + "/");
  }
  el.setAttribute("style", style);
  el.innerHTML = inner;
  grid.appendChild(el);
});
</script>
</body>
</html>
